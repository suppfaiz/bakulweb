services:

  # ── PHP-FPM Application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bakul_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:z
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-bakul_ecommerce}
      - DB_USER=${DB_USER:-bakul_user}
      - DB_PASS=${DB_PASS:-bakul_secret}
      - NOC_PASSWORD=${NOC_PASSWORD:-NocBakul2026!}
      - NOC_PATH=${NOC_PATH:-noc}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bakul_net

  # ── Nginx Web Server ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bakul_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bakul_net

  # ── MySQL Database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: bakul_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-bakul_ecommerce}
      MYSQL_USER: ${DB_USER:-bakul_user}
      MYSQL_PASSWORD: ${DB_PASS:-bakul_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-bakul_root_secret}
      TZ: Asia/Jakarta
    command: --performance_schema=OFF --innodb_buffer_pool_size=64M
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - bakul_db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-bakul_root_secret}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bakul_net

  # ── phpMyAdmin (opsional, matikan di production) ───────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bakul_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASS:-bakul_root_secret}
      UPLOAD_LIMIT: 100M
    depends_on:
      - db
    profiles:
      - tools
    networks:
      - bakul_net

volumes:
  bakul_db_data:
    driver: local

networks:
  bakul_net:
    driver: bridge
