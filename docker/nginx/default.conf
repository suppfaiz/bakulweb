server {
    listen 80;
    server_name _;

    # Document root → folder public/
    root /var/www/html/public;
    index index.php index.html;

    # Charset
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Max upload size
    client_max_body_size 25M;

    # Logging
    access_log /var/log/nginx/bakul_access.log;
    error_log  /var/log/nginx/bakul_error.log;

    # ── Static assets (cache agresif) ──────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Main routing → index.php ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM handler ────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeout untuk proses PHP yang panjang
        fastcgi_read_timeout 120;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Blokir akses ke file sensitif
    location ~ /\.(env|git|htaccess) {
        deny all;
    }
    location ~ /app/ {
        deny all;
    }
    location ~ /config/ {
        deny all;
    }
    location ~ /docker/ {
        deny all;
    }
}
